<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Login</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}" />

    <style>
      .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f5f6fa;
      }

      .login-card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        width: 300px;
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      button {
        width: 100%;
        margin-top: 20px;
        padding: 10px;
        border: none;
        border-radius: 5px;
        background: #2980b9;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        background: #1f6691;
      }
    </style>
  </head>

  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <h2>🔐 Iniciar sesión</h2>

        <form th:action="@{/login}" method="post">
          <label>Usuario</label>
          <input type="text" name="username" />

          <label>Contraseña</label>
          <input type="password" name="password" />

          <button type="submit">Entrar</button>
        </form>
      </div>
    </div>
  </body>
</html>
