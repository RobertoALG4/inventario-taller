<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <title>Salida</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}" />

    <style>
      /* CONTENEDOR CENTRADO */
      .wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: calc(100vh - 60px);
        background: #f5f6fa;
      }

      /* TARJETA */
      .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        width: 420px;
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 12px;
      }

      label {
        display: block;
        font-weight: bold;
        margin-bottom: 4px;
      }

      input,
      select {
        width: 100%;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      /* BOTONES */
      .btn {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        border: none;
        border-radius: 5px;
        background: #2980b9;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      .btn:hover {
        background: #1f6691;
      }

      .btn-volver {
        background: #7f8c8d;
      }

      .btn-volver:hover {
        background: #636e72;
      }
    </style>

    <!-- 🔥 AUTOCOMPLETAR (NO TOCADO) -->
    <script>
      function autocompletar(select) {
        const option = select.options[select.selectedIndex];

        document.getElementById("cliente").value = option.dataset.cliente || "";

        document.getElementById("matricula").value =
          option.dataset.matricula || "";

        document.getElementById("bastidor").value =
          option.dataset.bastidor || "";
      }
    </script>
  </head>

  <body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="wrapper">
      <div class="container">
        <h2>Registrar salida de material</h2>

        <form th:action="@{/movimiento/guardarSalida}" method="post">
          <div class="form-group">
            <label>Producto</label>
            <select name="productoProveedorId">
              <option
                th:each="pp : ${productosProveedor}"
                th:value="${pp.id}"
                th:text="${pp.producto.nombre + ' - ' + pp.proveedor.nombre + ' (Stock: ' + pp.stock + ')'}"
              ></option>
            </select>
          </div>

          <div class="form-group">
            <label>Informe</label>
            <select name="informeId" onchange="autocompletar(this)">
              <option value="">-- Sin informe --</option>

              <option
                th:each="inf : ${informes.?[!finalizado]}"
                th:value="${inf.id}"
                th:text="${'Informe #' + inf.id + ' - ' + inf.matricula}"
                th:attr="data-cliente=${inf.cliente},
                data-matricula=${inf.matricula},
                data-bastidor=${inf.bastidor}"
              ></option>
            </select>
          </div>

          <div class="form-group">
            <label>Cantidad</label>
            <input type="number" name="cantidad" />
          </div>

          <div class="form-group">
            <label>Cliente</label>
            <input type="text" id="cliente" name="cliente" />
          </div>

          <div class="form-group">
            <label>Matrícula</label>
            <input type="text" id="matricula" name="matricula" />
          </div>

          <div class="form-group">
            <label>Bastidor</label>
            <input type="text" id="bastidor" name="bastidor" />
          </div>

          <div class="form-group">
            <label>Descripción</label>
            <input type="text" name="descripcion" />
          </div>

          <button type="submit" class="btn">Registrar salida</button>

          <a href="/inventario">
            <button type="button" class="btn btn-volver">⬅ Volver</button>
          </a>
        </form>
      </div>
    </div>
  </body>
</html>
